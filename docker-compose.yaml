services:
  textin-mcp:
    build: .
    image: textin-mcp:latest
    ports:
      - "8004:8000"
    networks:
      - mcp-proxy_mcp_out_net
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      TEXTIN_APP_ID: ${TEXTIN_APP_ID}
      TEXTIN_SECRET_CODE: ${TEXTIN_SECRET_CODE}
      TEXTIN_SERVER_URL: ${TEXTIN_SERVER_URL:-}
      MAX_FILE_BYTES: ${MAX_FILE_BYTES:-52428800}

  file-base64:
    build: .
    image: textin-mcp:latest
    command: ["textin-file-base64"]
    ports:
      - "8005:8001"
    networks:
      - mcp-proxy_mcp_out_net
    environment:
      FILE_BASE64_HOST: 0.0.0.0
      FILE_BASE64_PORT: 8001
      FILE_STORAGE_DIR: /data/files
      FILE_PUBLIC_BASE_URL: ${FILE_PUBLIC_BASE_URL:-http://127.0.0.1:8005}
      FILE_RETENTION_SECONDS: ${FILE_RETENTION_SECONDS:-604800}
      FILE_CLEANUP_INTERVAL_SECONDS: ${FILE_CLEANUP_INTERVAL_SECONDS:-3600}
      MAX_FILE_BYTES: ${MAX_FILE_BYTES:-52428800}
    volumes:
      - file_storage:/data/files

networks:
  mcp-proxy_mcp_out_net:
    external: true

volumes:
  file_storage:
